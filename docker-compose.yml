version: "3.8"

services:
  api-user:
    build: ./api-user
    ports:
      - "5000:5000"
    depends_on:
      - service-account 
      - service-payment

  service-account:
    build: ./service-account
    ports:
      - "5001:5001"

  service-payment:
    build: ./service-payment
    ports:
      - "5002:5002"
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: fintech
    ports:
      - "5432:5432"

